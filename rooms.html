<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess — Rooms</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <span class="logo">♟ Chess</span>
    <div class="nav-right">
      <span class="username" id="nav-username"></span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="rooms-header">
      <h2>Game Rooms</h2>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="quick-join-btn">⚡ Quick Join</button>
      <button class="btn btn-secondary" id="create-room-btn">+ Create Room</button>
    </div>

    <div id="create-room-info" class="card hidden">
      <p class="section-title">Waiting for opponent…</p>
      <p id="created-room-id" class="text-muted mt-1"></p>
      <div id="create-room-msg" class="msg msg-info mt-1"></div>
    </div>

    <div id="action-msg" class="msg msg-error mt-1"></div>

    <div class="card">
      <p class="section-title">Available Rooms</p>
      <table class="room-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>White player</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rooms-tbody">
          <tr><td colspan="5" class="text-muted text-center">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/rooms.js"></script>
</body>
</html>
