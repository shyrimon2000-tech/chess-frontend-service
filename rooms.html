<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess — Rooms</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="room-game-bg">
  <nav class="navbar">
    <div class="logo-wrap">
      <img src="img/text.png" class="nav-logo" alt="Chess" />
    </div>
    <div class="nav-right">
      <span class="username" id="nav-username"></span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <div class="action-bar">
      <button class="btn btn-primary" id="quick-join-btn"><span style="display:inline-block;transform:scale(3);margin:0 0.5em 0 0.3em">⚔</span> Quick Join</button>
      <button class="btn btn-secondary" id="create-room-btn">+ Create Room</button>
    </div>

    <div id="create-room-info" class="card hidden">
      <p class="section-title">Waiting for opponent…</p>
      <p id="created-room-id" class="text-muted mt-1"></p>
      <div id="create-room-msg" class="msg msg-info mt-1"></div>
    </div>

    <div id="my-game-panel" class="card my-game-card hidden">
      <p class="section-title">↩ Your active game</p>
      <p class="text-muted mt-1">vs <strong id="my-game-opponent"></strong></p>
      <button class="btn btn-primary btn-sm mt-2" id="my-game-return-btn">Return to game</button>
    </div>

    <div id="action-msg" class="msg msg-error mt-1"></div>

    <div class="card">
      <p class="section-title">Available Rooms</p>
      <table class="room-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>White player</th>
            <th>Black player</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rooms-tbody">
          <tr><td colspan="6" class="text-muted text-center">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/rooms.js"></script>
</body>
</html>
