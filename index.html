<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-bg">
  <div class="auth-wrapper">
    <div class="auth-box">
      <h1>♟ Chess</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login tab -->
      <div id="tab-login" class="tab-panel active">
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary form-submit">Login</button>
        </form>
        <div id="login-msg" class="msg msg-error"></div>
      </div>

      <!-- Register tab -->
      <div id="tab-register" class="tab-panel">
        <form id="register-form" novalidate>
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn btn-primary form-submit">Register</button>
        </form>
        <div id="register-msg" class="msg"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
