name: CI

on:
  push:
    branches: [dev]
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chess-frontend-service .

      - name: Save Docker image
        run: docker save chess-frontend-service | gzip > image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Tag and push
        run: |
          docker tag chess-frontend-service ghcr.io/shyrimon2000-tech/chess-frontend-service:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/shyrimon2000-tech/chess-frontend-service:${{ steps.version.outputs.VERSION }}