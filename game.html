<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess — Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="room-game-bg">
  <nav class="navbar">
    <div class="logo-wrap">
      <img src="img/text.png" class="nav-logo" alt="Chess" />
    </div>
    <div class="nav-right">
      <span class="username" id="nav-username"></span>
      <a href="rooms.html" class="btn btn-secondary btn-sm">← Rooms</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="game-layout">

      <!-- Board -->
      <div class="board-bg">
        <div id="chessboard"></div>
      </div>

      <!-- Sidebar -->
      <div class="game-sidebar">

        <div class="players-bar">
          <div class="player-card" id="left-player">
            <div class="player-dot" id="left-dot"></div>
            <div class="player-info">
              <span class="player-name" id="left-name"></span>
              <span class="player-color-label" id="left-color-label">—</span>
            </div>
          </div>
          <span class="vs-label">vs</span>
          <div class="player-card" id="right-player">
            <div class="player-dot" id="right-dot"></div>
            <div class="player-info">
              <span class="player-name" id="right-name"></span>
              <span class="player-color-label" id="right-color-label">—</span>
            </div>
          </div>
        </div>

        <div class="status-bar">
          <div class="status-row">
            <span class="label">Status</span>
            <span class="value" id="game-status">—</span>
          </div>
        </div>

        <!-- Game over banner -->
        <div id="game-over-banner" class="banner">
          <h3 id="game-over-title"></h3>
          <p id="game-over-sub" class="text-muted"></p>
          <button class="btn btn-primary mt-2" onclick="window.location.href='rooms.html'">Back to Rooms</button>
        </div>

        <!-- Disconnect banner -->
        <div id="disconnect-banner" class="banner">
          <h3>Opponent disconnected</h3>
          <p id="disconnect-countdown" class="text-muted"></p>
        </div>

        <!-- Inline error -->
        <div id="game-msg" class="msg msg-error"></div>

        <div class="game-controls">
          <button class="btn btn-danger" id="resign-btn" style="display:none">Resign</button>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
