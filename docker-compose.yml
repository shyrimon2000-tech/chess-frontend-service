services:

  # ── Databases ──────────────────────────────────────────────

  auth-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_AUTH}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chess_auth_mysql_data:/var/lib/mysql
    networks:
      - chess_auth_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s

  room-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_ROOM}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chess_room_mysql_data:/var/lib/mysql
    networks:
      - chess_room_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s

  game-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_GAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chess_game_mysql_data:/var/lib/mysql
    networks:
      - chess_game_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s

  # ── Redis (shared between room and game services) ──────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - chess_room_internal
      - chess_game_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    stop_grace_period: 10s

  # ── Backend services ───────────────────────────────────────

  chess-auth-service:
    build:
      context: ../chess-auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_AUTH}
    volumes:
      - ../chess-auth-service/alembic:/app/alembic:ro
      - ../chess-auth-service/alembic.ini:/app/alembic.ini:ro
    ports:
      - "8000:8000"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - chess_auth_internal
      - chess_frontend_internal
    init: true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s

  chess-room-service:
    build:
      context: ../chess-room-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_ROOM}
    volumes:
      - ../chess-room-service/alembic:/app/alembic:ro
      - ../chess-room-service/alembic.ini:/app/alembic.ini:ro
    ports:
      - "8001:8000"
    depends_on:
      room-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chess_room_internal
      - chess_frontend_internal
    init: true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s

  chess-game-service:
    build:
      context: ../chess-game-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL_GAME}
    volumes:
      - ../chess-game-service/alembic:/app/alembic:ro
      - ../chess-game-service/alembic.ini:/app/alembic.ini:ro
    ports:
      - "8002:8000"
    depends_on:
      game-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chess_game_internal
      - chess_frontend_internal
    init: true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s

  # ── Frontend ───────────────────────────────────────────────

  chess-frontend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      chess-auth-service:
        condition: service_healthy
      chess-room-service:
        condition: service_healthy
      chess-game-service:
        condition: service_healthy
    networks:
      - chess_frontend_internal

volumes:
  chess_auth_mysql_data:
  chess_room_mysql_data:
  chess_game_mysql_data:

networks:
  chess_auth_internal:
    driver: bridge
  chess_room_internal:
    driver: bridge
  chess_game_internal:
    driver: bridge
  chess_frontend_internal:
    driver: bridge
